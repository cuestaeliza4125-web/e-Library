<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Library Laptop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Georgia', serif; overflow: hidden; transition: all 0.3s ease; color: #111; background: #f5f1e8; }
body.dark-mode { background: #1a1a1a; color: #fff; }
.page { width: 100vw; height: 100vh; position: relative; display: none; }
.page.active { display: block; }
.library-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('./images/bcp.jpg') center/cover no-repeat; z-index: -2; transition: filter 0.3s ease; }
body.dark-mode.library-bg { filter: brightness(0.2) grayscale(0.5); }
.bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.75); z-index: -1; transition: background 0.3s ease; }
body.dark-mode.bg-overlay { background: rgba(0, 0, 0, 0.85); }
.title { text-align: center; padding: 30px; font-size: 56px; letter-spacing: 4px; transition: color 0.3s ease; font-weight: 900; }
.book-container { display: flex; justify-content: center; gap: 60px; padding: 40px 20px; }
.book-item { transition: all 0.2s ease; cursor: pointer; }
.book-item img { width: 240px; height: 340px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); object-fit: cover; transition: transform 0.2s ease, width 0.3s ease, height 0.3s ease; }
.book-item:hover img { transform: scale(1.05); }
.book-item:active img { transform: scale(0.95); }
.book-item p { margin-top: 15px; text-align: center; font-weight: bold; font-size: 17px; transition: all 0.3s ease; }
.controls-wrapper { display: flex; justify-content: space-between; align-items: flex-end; padding: 40px 80px; position: fixed; bottom: 0; width: 100%; }
.left-side,.right-side { display: flex; gap: 15px; }
.center-spacer { flex: 1; }
.left-side button { padding: 14px 40px; font-weight: bold; font-size: 15px; border: 2px solid #222; background: white; border-radius: 8px; width: 200px; height: 50px; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; }
body.dark-mode.left-side button { border-color: #fff; background: #333; color: #fff; }
.left-side button:active { background: #8B4513; color: white; transform: scale(0.95); }
.controls-group { display: flex; align-items: center; gap: 20px; }
.text-size { display: flex; gap: 8px; }
.text-size button { width: 50px; height: 50px; font-size: 20px; font-weight: bold; border: 2px solid #222; background: white; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
body.dark-mode.text-size button { border-color: #fff; background: #333; color: #fff; }
.text-size button:active { background: #8B4513; color: white; transform: scale(0.95); }
.voice-speed { display: flex; align-items: center; gap: 8px; }
.voice-select { position: relative; border: 2px solid #222; border-radius: 8px; padding: 4px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; }
body.dark-mode.voice-select { border-color: #fff; background: #333; }
#voiceIconBtn { background: none; border: none; padding: 0; display: flex; }
#voiceIconBtn img { width: 40px; height: 40px; display: block; }
.gender-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 8px; transition: all 0.3s; }
.gender-badge.female { background: #FFC0CB; border: 2px solid #E91E63; }
.gender-badge.male { background: #BBDEFB; border: 2px solid #2196F3; }
#currentVoiceIcon { margin-right: 4px; }
.voice-popup { position: absolute; bottom: 55px; left: 0; background: white; border: 2px solid #222; border-radius: 10px; padding: 12px; z-index: 100; width: 200px; }
body.dark-mode.voice-popup { background: #333; border-color: #fff; }
.voice-popup.hidden { display: none; }
.voice-popup h3 { text-align: center; margin-bottom: 10px; font-size: 14px; }
.voice-list { padding: 0; display: flex; flex-direction: column; gap: 8px; }
.voice-list button { padding: 12px; font-size: 14px; font-weight: bold; border: 2px solid #222; background: white; text-align: left; cursor: pointer; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; }
body.dark-mode.voice-list button { background: #333; color: #fff; border-color: #fff; }
.voice-list button:hover { background: #8B4513; color: white; border-color: #8B4513; }
body.dark-mode.voice-list button:hover { background: #ffa500; color: #000; border-color: #ffa500; }
#speedSlider { width: 120px; margin-left: 0; }
#speedValue { display: inline-block; width: 40px; text-align: center; font-weight: bold; margin-left: 2px; }
#downloadBtn { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; border: none; padding: 16px 50px; font-size: 16px; border-radius: 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
#downloadBtn.hidden { display: none; }

/* BOOK PAGES STYLE */
.cover-page { width: 100vw; height: 100vh; position: relative; }
#emily-page.cover-page { background: url('images/emily-cover.jpg') no-repeat center/cover; }
#hour-page.cover-page { background: url('images/hour-cover.jpg') no-repeat center/cover; }
#magi-page.cover-page { background: url('images/magi-cover.jpg') no-repeat center/cover; }
.start-btn { position: absolute; bottom: 60px; right: 60px; background: #f8c4a5; color: #000; padding: 15px 35px; border-radius: 10px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; }
.start-btn:hover { transform: scale(1.05); }
.back-btn { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; font-size: 26px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; color: #000; }
.back-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
.back-btn:active { transform: scale(0.95); }
body.dark-mode.back-btn { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
</style>
</head>
<body>

<!-- LIBRARY PAGE -->
<div id="library-page" class="page active">
  <div class="library-bg"></div>
  <div class="bg-overlay"></div>
  <h1 class="title">E-LIBRARY</h1>
  <div class="book-container">
    <div class="book-item" data-book="0">
      <img src="images/emily.jpg" alt="A Rose for Emily">
      <p>A Rose for Emily<br><span>by William Faulkner</span></p>
    </div>
    <div class="book-item" data-book="1">
      <img src="images/hour.jpg" alt="The Story of an Hour">
      <p>The Story of an Hour<br><span>by Kate Chopin</span></p>
    </div>
    <div class="book-item" data-book="2">
      <img src="images/magi.jpg" alt="The Gift of the Magi">
      <p>The Gift of the Magi<br><span>by O. Henry</span></p>
    </div>
  </div>
  <div class="controls-wrapper">
    <div class="left-side">
      <button id="darkModeBtn">DARKMODE</button>
      <button id="fullscreenBtn">FULLSCREEN</button>
    </div>
    <div class="center-spacer"></div>
    <div class="right-side">
      <div class="controls-group">
        <div class="text-size">
          <button id="textDecrease">-</button>
          <button id="textIncrease">+</button>
        </div>
        <div class="voice-speed">
          <div class="voice-select">
            <button id="voiceIconBtn">
              <img src="images/voice PNG.jpg" alt="Voice">
            </button>
            <div id="voicePopup" class="voice-popup hidden">
              <h3>Select Voice</h3>
              <div class="voice-list">
                <button data-gender="female"><span class="gender-badge female">👩</span> Female</button>
                <button data-gender="male"><span class="gender-badge male">👨</span> Male</button>
              </div>
            </div>
          </div>
          <span id="currentVoiceIcon" class="gender-badge female">👩</span>
          <input type="range" id="speedSlider" min="0.5" max="1" step="0.25" value="1">
          <span id="speedValue">1x</span>
        </div>
      </div>
    </div>
  </div>
  <button id="downloadBtn" class="hidden">DOWNLOAD APP</button>
</div>

<!-- EMILY PAGE -->
<div id="emily-page" class="page">
  <div class="cover-page">
    <button class="back-btn"><</button>
    <button class="start-btn">start reading</button>
  </div>
</div>

<!-- HOUR PAGE -->
<div id="hour-page" class="page">
  <div class="cover-page">
    <button class="back-btn"><</button>
    <button class="start-btn">start reading</button>
  </div>
</div>

<!-- MAGI PAGE -->
<div id="magi-page" class="page">
  <div class="cover-page">
    <button class="back-btn"><</button>
    <button class="start-btn">start reading</button>
  </div>
</div>

<script>
console.log("PART 1 LOADED: E-Library Home - Laptop");
let isDark = false;
let currentSize = 100;
let selectedGender = 'female';
let currentRate = 1;
let femaleVoice = null;
let maleVoice = null;
let voices = [];
let voicesLoaded = false;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  if(voices.length > 0) {
    femaleVoice = voices.find(v => v.name.includes('Zira') || v.name.includes('Samantha') || v.name.includes('Female')) || voices[0];
    maleVoice = voices.find(v => v.name.includes('David') || v.name.includes('Daniel') || v.name.includes('Male')) || voices[1] || voices[0];
    voicesLoaded = true;
  }
}
speechSynthesis.onvoiceschanged = loadVoices;

window.addEventListener('load', () => {
  const downloadBtn = document.getElementById('downloadBtn');
  downloadBtn.classList.remove('hidden');
  setTimeout(() => { downloadBtn.classList.add('hidden'); }, 10000);
  loadVoices();
  setTimeout(loadVoices, 500);
  initBookClick();
  initBackBtn();
});

let speechTimeout;
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
speedSlider.addEventListener('input', () => {
  currentRate = speedSlider.value;
  speedValue.textContent = currentRate + 'x';
  clearTimeout(speechTimeout);
  speechTimeout = setTimeout(() => {
    if(voicesLoaded) speakSample(`Voice speed test`);
  }, 200);
});

const darkModeBtn = document.getElementById('darkModeBtn');
darkModeBtn.addEventListener('click', toggleDarkMode);
function toggleDarkMode() {
  isDark =!isDark;
  document.body.classList.toggle('dark-mode');
  darkModeBtn.textContent = isDark? 'LIGHTMODE' : 'DARKMODE';
}

const fullscreenBtn = document.getElementById('fullscreenBtn');
fullscreenBtn.addEventListener('click', toggleFullscreen);
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    fullscreenBtn.textContent = 'EXIT FULLSCREEN';
  } else {
    document.exitFullscreen();
    fullscreenBtn.textContent = 'FULLSCREEN';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) { fullscreenBtn.textContent = 'FULLSCREEN'; }
});

const textIncrease = document.getElementById('textIncrease');
const textDecrease = document.getElementById('textDecrease');
textIncrease.addEventListener('click', increaseText);
textDecrease.addEventListener('click', decreaseText);
function increaseText() { if(currentSize < 150) { currentSize += 10; updateScale(); } }
function decreaseText() { if(currentSize > 70) { currentSize -= 10; updateScale(); } }
function updateScale() {
  document.querySelectorAll('.book-item p').forEach(el => { el.style.fontSize = currentSize + '%'; });
  document.querySelectorAll('.book-item img').forEach(img => {
    img.style.width = (240 * currentSize / 100) + 'px';
    img.style.height = (340 * currentSize / 100) + 'px';
  });
}

const voiceIconBtn = document.getElementById('voiceIconBtn');
const voicePopup = document.getElementById('voicePopup');
const currentVoiceIcon = document.getElementById('currentVoiceIcon');
voiceIconBtn.addEventListener('click', () => { voicePopup.classList.toggle('hidden'); });
const voiceButtons = document.querySelectorAll('.voice-list button');
voiceButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedGender = btn.getAttribute('data-gender');
    if(selectedGender === 'male') {
      currentVoiceIcon.className = 'gender-badge male';
      currentVoiceIcon.textContent = '👨';
    } else {
      currentVoiceIcon.className = 'gender-badge female';
      currentVoiceIcon.textContent = '👩';
    }
    voicePopup.classList.add('hidden');
  });
});
document.addEventListener('click', (e) => {
  if(!voiceIconBtn.contains(e.target) &&!voicePopup.contains(e.target)) { voicePopup.classList.add('hidden'); }
});

document.addEventListener('keydown', (e) => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key.toLowerCase() === 'd') toggleDarkMode();
  if(e.key.toLowerCase() === 'f') toggleFullscreen();
  if(e.key === 'Escape' && document.fullscreenElement) toggleFullscreen();
  if(e.key === '+') increaseText();
  if(e.key === '-') decreaseText();
});

function speakSample(text) {
  if('speechSynthesis' in window && voicesLoaded) {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = currentRate;
    utterance.voice = selectedGender === 'male'? maleVoice : femaleVoice;
    utterance.pitch = selectedGender === 'male'? 0.9 : 1.1;
    speechSynthesis.speak(utterance);
  }
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function initBookClick() {
  const bookItems = document.querySelectorAll('.book-item');
  bookItems.forEach((item, index) => {
    item.addEventListener('click', () => {
      if(index === 0) showPage('emily-page');
      else if(index === 1) showPage('hour-page');
      else if(index === 2) showPage('magi-page');
    });
  });
}

function initBackBtn() {
  const backBtns = document.querySelectorAll('.back-btn');
  backBtns.forEach(btn => {
    btn.addEventListener('click', () => { showPage('library-page'); });
  });
}
</script>
</body>
</html>
